<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播辩论系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 28px;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            margin: 10px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .features {
            margin-top: 30px;
            text-align: left;
        }
        .features h3 {
            color: #333;
            margin-bottom: 15px;
        }
        .features ul {
            list-style: none;
            padding: 0;
        }
        .features li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            color: #666;
        }
        .features li:last-child {
            border-bottom: none;
        }
        .features li::before {
            content: "✓";
            color: #667eea;
            margin-right: 10px;
            font-weight: bold;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 10px;
            color: #0369a1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 直播辩论系统</h1>
        <p>全栈直播应用后端服务演示</p>

        <div class="features">
            <h3>✅ 已实现功能</h3>
            <ul>
                <li>投票系统接口</li>
                <li>辩题管理接口</li>
                <li>AI内容接口</li>
                <li>评论系统接口</li>
                <li>直播管理接口</li>
                <li>后台管理面板</li>
            </ul>
        </div>

        <div class="status">
            <strong>服务状态：</strong> 所有服务正常运行 ✅
        </div>

        <div style="margin-top: 30px;">
            <a href="/admin" class="btn">进入后台管理</a>
            <a href="https://live-fullstack-backend.onrender.com/api/admin/dashboard" class="btn btn-secondary" target="_blank">查看API文档</a>
        </div>
    </div>
</body>
</html>
